apiVersion: apps/v1
kind: Deployment
metadata:
  name: weaxle78-deployment
  labels:
    app: weaxle78
spec:
  selector:
    matchLabels:
      app: weaxle78
  template:
    metadata:
      labels:
        app: weaxle78
    spec:
      restartPolicy: Always
      containers:
        - name: weaxle78
          image: ghcr.io/pmdevers/weaxle78:sha-306a92a
          resources:
            requests:
              memory: 100Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          ports:
            - containerPort: 3001
          env:
            - name: TWITCH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: weaxle78-secrets
                  key: TWITCH_CLIENT_ID
            - name: TWITCH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: weaxle78-secrets
                  key: TWITCH_CLIENT_SECRET
            - name: TWITCH_LOGIN
              valueFrom:
                secretKeyRef:
                  name: weaxle78-secrets
                  key: TWITCH_LOGIN
            - name: YOUTUBE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weaxle78-secrets
                  key: YOUTUBE_API_KEY
            - name: YOUTUBE_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: weaxle78-secrets
                  key: YOUTUBE_CHANNEL_ID